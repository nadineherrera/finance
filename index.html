<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Dashboard</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0d0d0d;
    color: white;
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 20px;
  }

  .card {
    background: #151515;
    border-radius: 16px;
    padding: 16px;
  }

  h2 {
    margin: 0 0 10px 0;
  }

  .sub {
    font-size: 12px;
    opacity: 0.6;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  input, select {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
  }

  button {
    background: #B89A4C;
    border: none;
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
  }

  .ghost {
    background: transparent;
    border: 1px solid #333;
  }

  .task-item {
    background: #1e1e1e;
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
  }

  .task-item.done {
    opacity: 0.5;
    text-decoration: line-through;
  }

  .task-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .task-left {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .pill {
    background: #333;
    padding: 4px 8px;
    border-radius: 8px;
    font-size: 12px;
  }

  .tiny-btn {
    margin-top: 8px;
    background: #333;
  }
</style>
</head>

<body>

<div class="container">

  <!-- LEFT COLUMN -->
  <div>

    <!-- TASKS -->
    <section class="card">
      <h2>Tasks</h2>
      <div class="input-row">
        <input id="taskInput" placeholder="Add task"/>
        <select id="taskCategory">
          <option>Daily</option>
          <option>Home</option>
          <option>Admin</option>
        </select>
        <button id="addTaskBtn">Add</button>
      </div>
      <div id="taskList"></div>
    </section>

    <!-- 🔥 FOCUS TASKS (NEW) -->
    <section class="card">
      <div class="section-head">
        <h2>Focus Tasks</h2>
        <div class="sub">High-impact tasks you avoid. Keep this list small.</div>
        <button class="ghost" id="resetFocusBtn">Reset</button>
      </div>

      <div class="input-row">
        <input id="focusInput" placeholder="Add focus task"/>
        <select id="focusCategory">
          <option>Business</option>
          <option>Personal</option>
          <option>Finance</option>
        </select>
        <button id="addFocusBtn">Add</button>
      </div>

      <div id="focusList"></div>
    </section>

    <!-- SCHEDULE -->
    <section class="card">
      <h2>Schedule</h2>
      <div id="scheduleList"></div>
    </section>

  </div>

</div>

<script>
const storageKeys = {
  tasks: 'tasks',
  focus: 'focusTasks'
};

function uid() {
  return Date.now() + Math.random();
}

function save(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}

function load(key, fallback) {
  return JSON.parse(localStorage.getItem(key)) || fallback;
}

/* =======================
   TASKS
======================= */

let tasks = load(storageKeys.tasks, []);

function renderTasks() {
  const list = document.getElementById('taskList');
  list.innerHTML = '';

  tasks.forEach(task => {
    const div = document.createElement('div');
    div.className = 'task-item ' + (task.done ? 'done' : '');

    div.innerHTML = `
      <div class="task-top">
        <div class="task-left">
          <input type="checkbox" ${task.done ? 'checked' : ''}/>
          <div>${task.text}</div>
        </div>
        <span class="pill">${task.category}</span>
      </div>
      <button class="tiny-btn">Delete</button>
    `;

    div.querySelector('input').onclick = () => {
      task.done = !task.done;
      save(storageKeys.tasks, tasks);
      renderTasks();
    };

    div.querySelector('.tiny-btn').onclick = () => {
      tasks = tasks.filter(t => t.id !== task.id);
      save(storageKeys.tasks, tasks);
      renderTasks();
    };

    list.appendChild(div);
  });
}

document.getElementById('addTaskBtn').onclick = () => {
  const input = document.getElementById('taskInput');
  const cat = document.getElementById('taskCategory');

  if (!input.value.trim()) return;

  tasks.unshift({
    id: uid(),
    text: input.value,
    category: cat.value,
    done: false
  });

  input.value = '';
  save(storageKeys.tasks, tasks);
  renderTasks();
};

/* =======================
   🔥 FOCUS TASKS
======================= */

let focusTasks = load(storageKeys.focus, [
  { id: uid(), text: 'Figure out cost of Onyx bars', category: 'Business', done: false },
  { id: uid(), text: 'Organize debt + Rocket Money', category: 'Finance', done: false }
]);

function renderFocusTasks() {
  const list = document.getElementById('focusList');
  list.innerHTML = '';

  focusTasks.forEach(task => {
    const div = document.createElement('div');
    div.className = 'task-item ' + (task.done ? 'done' : '');

    div.innerHTML = `
      <div class="task-top">
        <div class="task-left">
          <input type="checkbox" ${task.done ? 'checked' : ''}/>
          <div>${task.text}</div>
        </div>
        <span class="pill">${task.category}</span>
      </div>
      <button class="tiny-btn">Delete</button>
    `;

    div.querySelector('input').onclick = () => {
      task.done = !task.done;
      save(storageKeys.focus, focusTasks);
      renderFocusTasks();
    };

    div.querySelector('.tiny-btn').onclick = () => {
      focusTasks = focusTasks.filter(t => t.id !== task.id);
      save(storageKeys.focus, focusTasks);
      renderFocusTasks();
    };

    list.appendChild(div);
  });
}

document.getElementById('addFocusBtn').onclick = () => {
  const input = document.getElementById('focusInput');
  const cat = document.getElementById('focusCategory');

  if (!input.value.trim()) return;

  focusTasks.unshift({
    id: uid(),
    text: input.value,
    category: cat.value,
    done: false
  });

  input.value = '';
  save(storageKeys.focus, focusTasks);
  renderFocusTasks();
};

document.getElementById('resetFocusBtn').onclick = () => {
  focusTasks = focusTasks.map(t => ({ ...t, done: false }));
  save(storageKeys.focus, focusTasks);
  renderFocusTasks();
};

/* =======================
   INIT
======================= */

renderTasks();
renderFocusTasks();

</script>

</body>
</html>
