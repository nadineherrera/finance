<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Tabs Viewer</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f6f1e7;
  margin: 0;
  padding: 20px;
}
.tabs {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 15px;
}
.tab {
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid #ccc;
  cursor: pointer;
  background: white;
}
.tab.active {
  background: #b89a4c;
  color: white;
}
.table-wrap {
  overflow: auto;
  max-height: 70vh;
  background: white;
  border-radius: 10px;
}
table {
  width: 100%;
  border-collapse: collapse;
}
th, td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
  font-size: 14px;
  text-align: left;
}
th {
  position: sticky;
  top: 0;
  background: #eee;
}
</style>
</head>
<body>

<h2>Finance Tabs Viewer</h2>
<p>Click tabs to view each sheet from your Excel file.</p>

<div class="tabs" id="tabs"></div>
<div id="content"></div>

<script>
const sheets = {
  "Groceries": {
    "columns": ["Date", "Store", "Item", "Category", "Amount"],
    "rows": [
      {"Date":"2026-03-01","Store":"Costco","Item":"Chicken","Category":"Protein","Amount":"24.99"},
      {"Date":"2026-03-02","Store":"Target","Item":"Rice","Category":"Pantry","Amount":"6.49"}
    ]
  },
  "Bills": {
    "columns": ["Due Date", "Bill", "Amount", "Status"],
    "rows": [
      {"Due Date":"2026-03-05","Bill":"Internet","Amount":"89.99","Status":"Paid"},
      {"Due Date":"2026-03-10","Bill":"Electric","Amount":"145.22","Status":"Due"}
    ]
  }
};

let active = Object.keys(sheets)[0];

const tabsEl = document.getElementById("tabs");
const contentEl = document.getElementById("content");

function renderTabs() {
  tabsEl.innerHTML = Object.keys(sheets).map(name =>
    `<div class="tab ${name === active ? 'active' : ''}" data-name="${name}">${name}</div>`
  ).join('');

  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
      active = tab.dataset.name;
      renderTabs();
      renderTable();
    };
  });
}

function renderTable() {
  const sheet = sheets[active];
  contentEl.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            ${sheet.columns.map(c => `<th>${c}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${sheet.rows.map(row => `
            <tr>
              ${sheet.columns.map(c => `<td>${row[c] ?? ''}</td>`).join('')}
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

renderTabs();
renderTable();
</script>

</body>
</html>
