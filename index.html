<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Dashboard</title>

<style>
:root {
  --bg: #f8f8f8;
  --text: #111;
  --accent: #111;
  --line: #e5e5e5;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 16px;
}

.card {
  background: #fff;
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 16px;
  border: 1px solid var(--line);
}

.section-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid var(--line);
  margin-top: 8px;
}

button {
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: white;
}

.ghost {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--line);
}

/* 🌬️ BREATHING BUBBLE (SMOOTH + MATCHED STYLE) */
.breath-circle {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  margin: 20px auto;

  background: radial-gradient(circle at 30% 30%, 
    rgba(255,255,255,0.7), 
    rgba(120,140,255,0.35), 
    rgba(80,100,220,0.5)
  );

  box-shadow: 
    0 10px 30px rgba(80,100,220,0.25),
    inset 0 4px 12px rgba(255,255,255,0.4);

  backdrop-filter: blur(6px);

  display: flex;
  align-items: center;
  justify-content: center;

  animation: breathe 11s ease-in-out infinite;
}

@keyframes breathe {
  0% { transform: scale(0.8); }
  50% { transform: scale(1.2); }
  100% { transform: scale(0.8); }
}

.breath-text {
  text-align: center;
  font-size: 14px;
}

.task-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
}

</style>
</head>

<body>
<div class="container">

<!-- 🌬️ BREATHING -->
<div class="card">
  <h2>Breathing</h2>
  <div class="breath-circle">
    <div class="breath-text">
      Breathe In<br>5–6 sec<br><br>
      Breathe Out<br>5–6 sec
    </div>
  </div>
</div>

<!-- 💧 WATER -->
<div class="card">
  <h2>Water</h2>
  <select id="waterGoal">
    <option value="8">8 cups</option>
    <option value="11">11 cups</option>
    <option value="15">15 cups</option>
  </select>
  <button onclick="addWater()">Add Cup</button>
  <div id="waterCount"></div>
</div>

<!-- 👶 MERAKI -->
<div class="card">
  <div class="section-head">
    <h2>Meraki</h2>
    <button class="ghost" onclick="resetMeraki()">Reset</button>
  </div>
  <div id="merakiList"></div>
</div>

<!-- ❤️ FAMILY -->
<div class="card">
  <div class="section-head">
    <h2>Family</h2>
    <button class="ghost" onclick="resetFamily()">Reset</button>
  </div>
  <div id="familyList"></div>
</div>

</div>

<script>

// 💧 WATER
let water = 0;
function addWater(){
  water++;
  document.getElementById('waterCount').innerText = water + " cups";
}

// 👶 MERAKI
let meraki = [
  {text:'Bath',done:false},
  {text:'Brush teeth',done:false},
  {text:'Homework',done:false},
  {text:'Bus AM',done:false},
  {text:'Bus PM',done:false}
];

function renderMeraki(){
  const list = document.getElementById('merakiList');
  list.innerHTML='';
  meraki.forEach((t,i)=>{
    list.innerHTML += `<div class="task-item">
      <span>${t.text}</span>
      <input type="checkbox" ${t.done?'checked':''} onclick="toggleMeraki(${i})">
    </div>`;
  });
}

function toggleMeraki(i){
  meraki[i].done=!meraki[i].done;
  renderMeraki();
}

function resetMeraki(){
  meraki.forEach(t=>t.done=false);
  renderMeraki();
}

// ❤️ FAMILY
let family = [
  {text:'Family time',done:false},
  {text:'Take out trash',done:false},
  {text:'Feed cats',done:false},
  {text:'Clean litter',done:false}
];

function renderFamily(){
  const list = document.getElementById('familyList');
  list.innerHTML='';
  family.forEach((t,i)=>{
    list.innerHTML += `<div class="task-item">
      <span>${t.text}</span>
      <input type="checkbox" ${t.done?'checked':''} onclick="toggleFamily(${i})">
    </div>`;
  });
}

function toggleFamily(i){
  family[i].done=!family[i].done;
  renderFamily();
}

function resetFamily(){
  family.forEach(t=>t.done=false);
  renderFamily();
}

renderMeraki();
renderFamily();

</script>

</body>
</html>
